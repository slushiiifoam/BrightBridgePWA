<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BrightBridge - Login or Sign Up">
  <meta name="theme-color" content="#5B4B8A">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>BrightBridge - Login</title>
  
  <!-- Styles for the page-->
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/loginStyles.css">

  <!-- The line that allows netlify identity-->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
</head>
<body class="gradient-bg full-height">
  
  <main class="container center-content" style="flex: 1; justify-content: center;">
    
    <div class="login-card fade-in">
      <h1 class="text-center text-white mb-lg">Welcome to BrightBridge!</h1>
      

      <!-- The class that will contain the login creds-->
      <div class="container">
        <header>
            <div id="auth-controls">
                <!-- Auth buttons will be injected here -->
            </div>
        </header>

        <main>
            <!-- Login/Signup View -->
            <div id="auth-view" class="view">
                <button id="login-btn" class="btn btn-primary">Log In / Sign Up</button>
            </div>

            <!-- App View (shown when logged in) -->
            <div id="app-view" class="view hidden">
                <div class="user-info">
                    <h2>Welcome, <span id="user-name"></span>!</h2>
                    <p>Email: <span id="user-email"></span></p>
                </div>

                <section class="data-section">
                    <h3>Your Data</h3>
                    
                    <div class="form-group">
                        <label for="data-input">Enter some data:</label>
                        <input type="text" id="data-input" placeholder="Type something...">
                        <button id="save-btn" class="btn btn-primary">Save Data</button>
                    </div>

                    <div class="saved-data">
                        <h4>Saved Items:</h4>
                        <div id="data-list" class="data-list">
                            <!-- Saved items will appear here -->
                        </div>
                    </div>
                </section>

                <button id="logout-btn" class="btn btn-secondary">Log Out</button>
            </div>
        </main>
    </div>

      
      <div class="login-options mt-md">
        <p class="text-center text-white" style="font-size: var(--font-size-xs);">
          Don't have an account? Your first login will create one.
        </p>
      </div>
      
    </div>
    
  </main>
  
  <a href="https://www.weather.com" class="quick-exit" aria-label="Quick exit to weather website">
    quick exit
  </a>
  
  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (username && password) {
        localStorage.setItem('brightbridge_username', username);
        
        const isFirstTime = !localStorage.getItem('brightbridge_returning_user');
        
        if (isFirstTime) {
          localStorage.setItem('brightbridge_returning_user', 'true');
          
          window.location.href = '/assets/home-first-time.html';
        } else {
          window.location.href = '/assets/home.html';
        }
      }
    }
    
    window.addEventListener('load', () => {
      document.body.style.opacity = '1';
    });
  </script>

  <script src="../js/identity-display.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  
</body>
</html>
