<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BrightBridge - Welcome Home">
  <meta name="theme-color" content="#5B4B8A">
  
  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>BrightBridge - Home</title>
  
  <link rel="stylesheet" href="styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="full-height">
  
  <header class="gradient-header">
    <div class="header-content">
      <button type="button" class="logout-btn" onclick="handleLogout()" aria-label="Log out">
        Log Out
      </button>
    </div>
  </header>
  
  <main class="container" style="flex: 1; padding-top: var(--spacing-lg);">
    
    <section class="welcome-section fade-in">
      <h1 class="text-center" id="welcomeMessage">
        Hi <span id="userName">User</span>,<br>
        welcome home!
      </h1>
    </section>
    
    <section class="mood-checkin mt-lg fade-in" style="animation-delay: 0.2s;">
      <h2 class="text-center mb-md">How are you feeling today?</h2>
      
      <div class="mood-selector" role="group" aria-label="Select your mood">
        <button 
          class="mood-btn happy" 
          onclick="selectMood('happy')"
          aria-label="Happy mood"
          data-mood="happy"
        >
          😊
        </button>
        <button 
          class="mood-btn neutral" 
          onclick="selectMood('neutral')"
          aria-label="Neutral mood"
          data-mood="neutral"
        >
          😐
        </button>
        <button 
          class="mood-btn sad" 
          onclick="selectMood('sad')"
          aria-label="Sad mood"
          data-mood="sad"
        >
          ☹️
        </button>
      </div>
    </section>
    
    <section class="daily-journal mt-lg fade-in" style="animation-delay: 0.4s;">
      <h2 class="text-center mb-md">How was your day?</h2>
      
      <form id="dailyJournalForm" onsubmit="submitJournal(event)">
        <div class="form-group">
          <label for="dailyEntry" class="sr-only">Write about your day</label>
          <textarea 
            id="dailyEntry" 
            name="dailyEntry" 
            class="form-textarea" 
            placeholder="start typing..."
            rows="6"
            aria-label="Write about your day"
          ></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
          Continue to Dashboard
        </button>
      </form>
    </section>
    
  </main>
  
  <a href="https://www.weather.com" class="quick-exit" aria-label="Quick exit to weather website">
    quick exit
  </a>
  
  <script src="../js/identity-display.js"></script>
  <script src="../js/journal-store.js"></script>
  <script>
    let selectedMood = null;
    let currentUserKey = 'anonymous';
    
    window.addEventListener('load', () => {
      const cachedName = (window.IdentityDisplayName
        && typeof window.IdentityDisplayName.readStoredDisplayName === 'function')
        ? window.IdentityDisplayName.readStoredDisplayName()
        : '';
      setWelcomeName(cachedName);

      if (window.netlifyIdentity) {
        window.netlifyIdentity.init();

        const syncFromUser = (user) => {
          // Use shared resolver so this page matches login/dashboard fallback behavior.
          const resolvedName = (window.IdentityDisplayName
            && typeof window.IdentityDisplayName.syncStoredDisplayName === 'function')
            ? window.IdentityDisplayName.syncStoredDisplayName(user)
            : '';

          if (resolvedName) {
            setWelcomeName(resolvedName);
          }

          if (window.JournalStore && typeof window.JournalStore.resolveUserKey === 'function') {
            currentUserKey = window.JournalStore.resolveUserKey(user);
          }
        };

        syncFromUser(window.netlifyIdentity.currentUser());
        window.netlifyIdentity.on('init', syncFromUser);
        window.netlifyIdentity.on('login', syncFromUser);
      }
      
      document.body.style.opacity = '1';
    });

    function setWelcomeName(name) {
      document.getElementById('userName').textContent = (name || 'User').trim() || 'User';
    }
    
    function selectMood(mood) {
      selectedMood = mood;
      
      document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      const selectedBtn = document.querySelector(`[data-mood="${mood}"]`);
      selectedBtn.classList.add('active');
      
      // Keep page logic simple by delegating storage details to JournalStore.
      if (window.JournalStore && typeof window.JournalStore.saveMood === 'function') {
        window.JournalStore.saveMood(currentUserKey, mood);
      }
      
      selectedBtn.style.transform = 'scale(1.1)';
      setTimeout(() => {
        selectedBtn.style.transform = '';
      }, 200);
    }
    
    function submitJournal(event) {
      event.preventDefault();
      
      const journalEntry = document.getElementById('dailyEntry').value;

      if (window.JournalStore && typeof window.JournalStore.saveJournalEntry === 'function') {
        window.JournalStore.saveJournalEntry(currentUserKey, journalEntry, selectedMood);
      }
      
      window.location.href = 'home.html';
    }

    function handleLogout() {
      const redirectToLogin = () => {
        window.location.assign('/test/login.html');
      };

      if (window.netlifyIdentity) {
        window.netlifyIdentity.logout();
      }

      redirectToLogin();
    }
  </script>
  
  <style>
    body {
      opacity: 0;
      transition: opacity 0.5s ease;
      background-color: var(--white);
    }
    
    .gradient-header {
      min-height: 80px;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    .header-content {
      position: relative;
      min-height: 80px;
    }

    .logout-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.16);
      color: var(--white);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: var(--font-size-xs);
      cursor: pointer;
      transition: background-color var(--transition-fast), transform var(--transition-fast);
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: translateY(-1px);
    }
    
    .welcome-section h1 {
      font-size: var(--font-size-lg);
      color: var(--text-dark);
      line-height: 1.4;
      font-weight: 600;
    }
    
    .mood-checkin h2,
    .daily-journal h2 {
      font-size: var(--font-size-md);
      font-weight: 600;
      color: var(--text-dark);
    }
    
    .mood-selector {
      padding: var(--spacing-md) 0;
    }
    
    .mood-btn {
      box-shadow: var(--shadow-md);
    }
    
    .form-textarea {
      background-color: var(--light-gray);
      border: 2px solid var(--light-gray);
      font-size: var(--font-size-sm);
      line-height: 1.6;
    }
    
    .form-textarea:focus {
      background-color: var(--white);
      border-color: var(--primary-purple);
    }
    
    .daily-journal {
      margin-bottom: var(--spacing-xl);
    }
    
    @media (max-width: 480px) {
      .welcome-section h1 {
        font-size: var(--font-size-md);
      }
      
      .mood-btn {
        width: 56px;
        height: 56px;
        font-size: 28px;
      }

      .header-content {
        min-height: 72px;
      }

      .logout-btn {
        top: 12px;
        right: 12px;
      }
    }
    
    @media (min-width: 481px) {
      .gradient-header {
        min-height: 100px;
      }
      
      .welcome-section h1 {
        font-size: var(--font-size-xl);
      }
    }
  </style>
  
</body>
</html>
