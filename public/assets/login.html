<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BrightBridge - Login or Sign Up">
  <meta name="theme-color" content="#5B4B8A">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>BrightBridge - Login</title>
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="./css/loginStyles0.css">
  
</head>
<body class="gradient-bg full-height">
  
  <main class="container center-content" style="flex: 1; justify-content: center;">
    
    <div class="login-card fade-in">
      <h1 class="text-center text-white mb-lg">Log In / Sign Up</h1>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email" class="sr-only">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="email"
            required
            autocomplete="username"
            aria-label="Enter your email"
          >
        </div>
        <div class="form-group">
          <label for="password" class="sr-only">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="password"
            required
            autocomplete="current-password"
            aria-label="Enter your password"
          >
        </div>
        
        <button type="submit" class="btn btn-light btn-large" style="width: 100%;">
          Continue
        </button>
        
      </form>
      
      <div class="login-options mt-md">
        <p class="text-center text-white" style="font-size: var(--font-size-xs);">
          Don't have an account? Your first login will create one.
        </p>
      </div>
      
    </div>
    
  </main>
  
  <a href="https://www.weather.com" class="quick-exit" aria-label="Quick exit to weather website">
    quick exit
  </a>
  
  <!-- make page visible even if module errors out -->
  <script>
    window.addEventListener('load', () => {
      document.body.style.opacity = '1';
    });
  </script>
  <script type="module">
    // always show page when loaded
    window.addEventListener("load", () => {
      document.body.style.opacity = "1";
    });

    import("../js/auth.js")
      .then(({ default: Auth }) => {
        console.log("auth module loaded");

        async function handleAuth(event) {
          console.log('handleAuth called');
          event.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          console.log('credentials', email, password);

          if (!email || !password) return;

          try {
            const loginResult = await Auth.login(email, password);
            console.log('login result', loginResult);
            window.location.href = "home.html";
          } catch (err) {
            console.error('login error', err);
            if (err.status === 400 || (err.message && err.message.includes("Invalid login"))) {
              try {
                const signupResult = await Auth.signUp(email, password);
                console.log('signup result', signupResult);
                window.location.href = "home-first-time.html";
              } catch (signupErr) {
                console.error('signup error', signupErr);
                alert("Signup failed: " + signupErr.message);
              }
            } else {
              alert("Login failed: " + err.message);
            }
          }
        }

        document.getElementById('loginForm').addEventListener('submit', handleAuth);
      })
      .catch((e) => {
        console.error("failed to import auth module", e);
      });
  </script>

  <!-- load main app module (it imports Auth/Data itself) -->
  <script type="module" src="../js/app.js"></script>
  
</body>
</html>
