<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BrightBridge - Login or Sign Up">
  <meta name="theme-color" content="#5B4B8A">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>BrightBridge - Login</title>
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="./css/loginStyles0.css">
  
</head>
<body class="gradient-bg full-height">
  
  <main class="container center-content" style="flex: 1; justify-content: center;">
    
    <div class="login-card fade-in">
      <h1 class="text-center text-white mb-lg">Log In / Sign Up</h1>
      <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username" class="sr-only">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            placeholder="username"
            required
            autocomplete="username"
            aria-label="Enter your username"
          >
        </div>
        <div class="form-group">
          <label for="password" class="sr-only">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="password"
            required
            autocomplete="current-password"
            aria-label="Enter your password"
          >
        </div>
        
        <button type="submit" class="btn btn-light btn-large" style="width: 100%;">
          Continue
        </button>
        
      </form>
      
      <div class="login-options mt-md">
        <p class="text-center text-white" style="font-size: var(--font-size-xs);">
          Don't have an account? Your first login will create one.
        </p>
      </div>
      
    </div>
    
  </main>
  
  <a href="https://www.weather.com" class="quick-exit" aria-label="Quick exit to weather website">
    quick exit
  </a>
  
  <script src="./js/auth.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/app.js"></script>
  
  <script>
    function redirectAfterLogin() {
      const isFirstTime = !localStorage.getItem('brightbridge_returning_user');

      if (isFirstTime) {
        localStorage.setItem('brightbridge_returning_user', 'true');
        window.location.href = 'home-first-time.html';
      } else {
        window.location.href = 'home.html';
      }
    }

    function handleLogin(event) {
      event.preventDefault();
      console.log('Login attempt...');

      if (!window.netlifyIdentity) {
        console.log('Netlify Identity not available, trying local mode...');
      }

      const username = document.getElementById('username').value.trim();
      if (username) {
        localStorage.setItem('brightbridge_username', username);
        console.log('Username saved:', username);
      }

      console.log('Calling Auth.login()...');
      Auth.login();

      // If running locally (no Netlify Identity), Auth.login() will immediately log in and we can redirect.
      if (Auth.isLocalMode() && Auth.isLoggedIn()) {
        console.log('Local mode login successful, redirecting...');
        redirectAfterLogin();
      } else {
        console.log('Auth state - Local mode:', Auth.isLocalMode(), 'Logged in:', Auth.isLoggedIn());
      }
    }

    // When using Netlify Identity, redirect after successful login
    if (window.netlifyIdentity) {
      console.log('Setting up Netlify Identity listeners...');
      window.netlifyIdentity.on('login', () => {
        console.log('Netlify Identity login event fired');
        redirectAfterLogin();
      });
    } else {
      console.log('Netlify Identity not available');
    }

    window.addEventListener('load', () => {
      console.log('Page loaded, Auth available:', typeof window.Auth !== 'undefined');
      document.body.style.opacity = '1';
    });
  </script>
  
</body>
</html>
